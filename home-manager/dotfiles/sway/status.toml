[theme]
theme = "dracula"

[icons]
icons = "awesome6"

[[block]]
block = "disk_space"
info_type = "available"
alert_unit = "GB"
alert = 10.0
warning = 15.0
format = " $icon $available "
format_alt = " $icon $available / $total "

[[block]]
block = "memory"
format = " $icon $mem_used_percents.eng(w:1) "
format_alt = " $icon_swap $swap_free.eng(w:3,u:B,p:M)/$swap_total.eng(w:3,u:B,p:M)($swap_used_percents.eng(w:2)) "
interval = 30
warning_mem = 70
critical_mem = 90

[[block]]
block = "net"
device = "^wlp4s0$"
interval = 2
format = " 󰖩 {$ssid|$device} "
format_alt = " 󰖩 {$ssid|$device} 󰁅 $speed_down.eng(prefix:K) 󰁝 $speed_up.eng(prefix:K) "
inactive_format = " 󰖪 down "
missing_format = " 󰖪 n/a "

[[block]]
block = "cpu"
interval = 1
format = "  $barchart $utilization "
format_alt = "  $frequency{ $boost|} "
info_cpu = 20
warning_cpu = 50
critical_cpu = 90

[[block]]
block = "temperature"
format = " $icon $max max "
format_alt = " $icon $min min, $max max, $average avg "
interval = 10
chip = "k10temp-pci-00c3"

[[block]]
block = "custom"
json = true
interval = 5
command = '''
if nmcli -t -f TYPE,NAME connection show --active | grep -q '^vpn:'; then
  printf '{"text":"󰌾 VPN","state":"Good"}\n'
else
  printf '{"text":"󰌿 off","state":"Idle"}\n'
fi
'''
format = " $text.pango-str() "

[[block]]
block = "custom"
json = true
interval = 2
command = '''
volume="$(pamixer --get-volume-human 2>/dev/null || printf 'n/a')"
if [ "$volume" = "muted" ]; then
  printf '{"text":"󰝟 mute","state":"Idle"}\n'
else
  printf '{"text":" %s","state":"Good"}\n' "$volume"
fi
'''
format = " $text.pango-str() "

[[block]]
block = "battery"
interval = 30
format = " 󰁹 $percentage "

[[block]]
block = "time"
interval = 60
[block.format]
full = " $icon $timestamp.datetime(f:'%a %Y-%m-%d %R %Z', l:ru_RU) "
short = " $icon $timestamp.datetime(f:%R) "

[[block]]
block = "keyboard_layout"
driver = "sway"
